; The Long Noon uses Enhanced Input (UE5). Input is authored as data assets in
; Content/Input (InputMappingContexts + InputActions), not as legacy action/axis
; mappings here. This file keeps the Enhanced Input defaults wired.
;
; Planned Input Actions (authored in-editor, Content/Input):
;   IA_Move (Axis2D), IA_Look (Axis2D), IA_Jump, IA_Sprint, IA_Interact,
;   IA_Prune, IA_Still, IA_OpenInventory, IA_OpenCodex, IA_OpenBuild, IA_OpenMap, IA_Pause
; All bound through IMC_Default and remappable via the settings menu (UI module).

[/Script/Engine.InputSettings]
DefaultPlayerInputClass=/Script/EnhancedInput.EnhancedPlayerInput
DefaultInputComponentClass=/Script/EnhancedInput.EnhancedInputComponent
bEnableMouseSmoothing=True
bEnableGamepadInput=True
